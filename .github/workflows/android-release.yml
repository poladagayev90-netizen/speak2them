name: Android Release (signed AAB)

# Manual trigger. Produces a signed .aab ready to upload to Play Console.
# Requires these repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   — base64 of your upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD — keystore (store) password
#   ANDROID_KEY_ALIAS         — key alias (e.g. "upload")
#   ANDROID_KEY_PASSWORD      — key password
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        env:
          CI: false
          PUBLIC_URL: "."

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: speaklab-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
