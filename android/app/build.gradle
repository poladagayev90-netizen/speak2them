apply plugin: 'com.android.application'

// Release signing credentials are read from android/app/gradle.properties,
// which is git-ignored, so the keystore passwords never enter version control.
// Gradle does not auto-load a module-level gradle.properties, so it is loaded
// explicitly here. When the keys are missing (fresh clone, CI without secrets)
// the release build falls back to unsigned; debug builds are unaffected.
def releaseSigningProps = new Properties()
def releaseSigningFile = file("gradle.properties")
if (releaseSigningFile.exists()) {
    releaseSigningFile.withInputStream { releaseSigningProps.load(it) }
}
def hasReleaseSigning = releaseSigningProps.getProperty('MYAPP_RELEASE_STORE_PASSWORD')?.trim()

android {
    namespace = "com.speaklab.app"
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file('speaklab-release.jks')
                storePassword releaseSigningProps['MYAPP_RELEASE_STORE_PASSWORD']
                keyAlias releaseSigningProps['MYAPP_RELEASE_KEY_ALIAS']
                keyPassword releaseSigningProps['MYAPP_RELEASE_KEY_PASSWORD']
                // minSdk 24 makes AGP drop v1 (JAR) signing, leaving the APK
                // v2-only. Play re-signs the bundle so it never notices, but a
                // sideloaded APK has to satisfy the device itself — keep v1 on
                // so installing straight from the file works everywhere.
                enableV1Signing true
                enableV2Signing true
            }
        }
    }
    defaultConfig {
        applicationId "com.speaklab.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
             // "!ig": public/ig holds Instagram marketing assets that Vercel
             // must keep serving, but they have no business inside the APK
             // (they alone grew it 8.8→13.2MB).
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~:!ig'
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
