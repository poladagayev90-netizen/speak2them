<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="%PUBLIC_URL%/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0D1B3E" />
    <meta name="google" content="notranslate" />
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpeakLab" />
    <meta name="application-name" content="SpeakLab" />
    <meta name="msapplication-TileColor" content="#0D1B3E" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon-180.png" />

    <title>SpeakLab</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:red; color:white; z-index:999999; padding:20px; font-size:14px; overflow:scroll; word-wrap:break-word;';
        errDiv.innerHTML = '<h2>APP CRASHED</h2><p><b>Error:</b> ' + message + '</p><p><b>Source:</b> ' + source + ' : ' + lineno + '</p><p><b>Stack:</b> ' + (error ? error.stack : 'N/A') + '</p>';
        document.body.appendChild(errDiv);
      };
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:orange; color:white; z-index:999999; padding:20px; font-size:14px; overflow:scroll; word-wrap:break-word;';
        errDiv.innerHTML = '<h2>PROMISE REJECTION</h2><p><b>Reason:</b> ' + (event.reason ? event.reason.stack || event.reason : 'Unknown') + '</p>';
        document.body.appendChild(errDiv);
      });
    </script>
    <script>
      if (window.location.hash.includes('tgWebAppData') || window.location.search.includes('tgWebAppData')) {
        document.write('<script src="https://telegram.org/js/telegram-web-app.js"><\/script>');
      }
    </script>
    <style>
      html, body {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
